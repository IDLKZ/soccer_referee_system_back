ktor:
  application:
    modules:
      - kz.kff.ApplicationKt.module
  deployment:
    environment: dev
    port: 8000
    host: 127.0.0.1

#Open Api Settings
swagger:
  title: "Soccer Referee App"
  description: "Soccer Referee App"
  enabled: true
  version: "1.0.0"
  path: "swagger"

# Общие настройки БД
database:
  jdbcUrl: "jdbc:postgresql://localhost:5432/soccer_referee_db"
  username: "postgres"
  password: "root"
  driverClassName: "org.postgresql.Driver"

  # Pool размеры
  maximumPoolSize: 10
  minimumIdle: 2

  # Таймауты (в миллисекундах)
  idleTimeout: 600000        # 10 минут
  connectionTimeout: 30000   # 30 секунд
  maxLifetime: 1800000       # 30 минут
  validationTimeout: 5000    # 5 секунд

  # Дополнительно
  poolName: "MainSoccerRefereeHikariPoolBack"
  autoCommit: true
  connectionTestQuery: "SELECT 1"

# Flyway использует те же настройки
flyway:
  enabled: true
  locations: "classpath:db/migration"
  baselineOnMigrate: true
  validateOnMigrate: true

#Безопасность
jwt:
  secret: "91abcf4fa1d28f16f6ea71ab7203241510b4253c6d84ef01cb857d8db93aa4f6"
  issuer: "soccer_referee_system_back"
  audience: "soccer_referee_system_front"
  access_expiration: 720000
  refresh_expiration: 604800000

# Файловый сервис
storage:
  useStorage: true
  uploadDir: "uploads"
  accessDir: "/uploads"
  maxFileSizeMb: 10
  allowedExtensions:
    - jpg
    - jpeg
    - png
    - gif
    - pdf
    - doc
    - docx
    - xls
    - xlsx
  forbiddenExtensions:
    - exe
    - bat
    - sh
    - cmd
    - ps1
    - jar
